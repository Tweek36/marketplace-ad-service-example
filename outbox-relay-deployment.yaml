apiVersion: apps/v1
kind: Deployment
metadata:
  name: student-tweek36-marketplace-ad-service-outbox-relay
  namespace: student-tweek36-marketplace-ad-service
  labels:
    app.kubernetes.io/name: student-tweek36-marketplace-ad-service
    app.kubernetes.io/component: outbox-relay
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: student-tweek36-marketplace-ad-service
      app.kubernetes.io/component: outbox-relay
  template:
    metadata:
      labels:
        app.kubernetes.io/name: student-tweek36-marketplace-ad-service
        app.kubernetes.io/component: outbox-relay
    spec:
      containers:
      - name: outbox-relay
        image: ghcr.io/tweek36/marketplace-ad-service-example:stable
        imagePullPolicy: IfNotPresent
        command: ["uv", "run", "python", "-m", "bin.outbox"]
        env:
        - name: POSTGRES_DATABASE_NAME
          value: "student_Tweek36-marketplace-ad-service-postgres"
        - name: POSTGRES_HOST
          value: "postgres-postgresql.postgres.svc"
        - name: POSTGRES_PORT
          value: "5432"
        - name: POSTGRES_USERNAME
          valueFrom:
            secretKeyRef:
              name: student-tweek36-marketplace-ad-service-secrets
              key: POSTGRES_USERNAME
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: student-tweek36-marketplace-ad-service-secrets
              key: POSTGRES_PASSWORD
        - name: KAFKA_BOOTSTRAP_SERVERS
          value: "kafka.kafka.svc.cluster.local:9092"
        - name: KAFKA_TOPIC_ADS
          value: "student_Tweek36-marketplace.ads"
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop: ["ALL"]
          runAsNonRoot: true
          runAsUser: 1000
          seccompProfile:
            type: RuntimeDefault
        resources:
          limits:
            cpu: "500m"
            memory: "512Mi"
          requests:
            cpu: "100m"
            memory: "64Mi"
      nodeSelector:
        usecase: students
      tolerations:
      - key: "dedicated"
        operator: "Equal"
        value: "students"
        effect: "NoSchedule"